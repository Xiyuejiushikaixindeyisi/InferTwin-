experiment:
  name: streaming_capacity_sweep_instance_latency
  description: Streaming HBM capacity sweep with per-instance fitted TTFT profiles, model registry validation, and explicit calibration fallback policy.

simulation:
  mode: capacity_sweep_streaming

trace:
  path: data/samples/sample_trace.csv
  time_column: service_start_time
  instance_column: instance_uuid
  request_params_column: request_params

tokenizers:
  root: tokenizers
  default_profile: glm-v5
  cache_scope: tenant_isolated

cache:
  block_size_tokens: 16
  policy: hbm
  eviction_policy: lru

sweep:
  hbm_capacity_blocks: [512, 1024, 2048]
  parallel_instances: false

scheduler:
  policy: fcfs
  max_num_batched_tokens: 8192
  max_num_seqs: 32
  enable_chunked_prefill: true
  long_prefill_token_threshold: 4096

latency:
  backend: fitted_ttft
  model_name: glm-v5
  hardware_name: global-fallback
  fitted_ttft:
    profile: global_fallback_default
    function: token_linear_v1
    intercept_ms: 0.0
    ms_per_uncached_token: 0.02
    calibrated_from: manual_default

model_registry:
  profile_path: configs/models/registry.yaml

instance_runtime:
  profile_path: configs/instances/local-fixed-route-latency-example.yaml

instance_latency:
  profile_path: configs/instances/local-fixed-route-latency-example.yaml
  require_all_trace_instances: true

latency_fallback:
  on_calibration_failure: use_model_default

streaming:
  shard_root: reports/streaming_capacity_sweep_instance_latency/streaming_shards
  rejected_path: reports/streaming_capacity_sweep_instance_latency/rejected_requests.csv
  require_sorted_trace: true

output:
  directory: reports/streaming_capacity_sweep_instance_latency
  cache_events: false
  cache_event_capacities: []
