experiment:
  name: default_infertwin_simulation
  description: Offline batch-aware replay with infinite per-instance HBM cache.

simulation:
  mode: batch_aware_infinite_hbm

trace:
  path: data/samples/sample_trace.csv
  time_column: service_start_time
  instance_column: instance_uuid
  request_params_column: request_params

tokenizers:
  root: tokenizers
  default_profile: glm-v5
  cache_scope: tenant_isolated

cache:
  block_size_tokens: 16

scheduler:
  policy: fcfs
  max_num_batched_tokens: 8192
  max_num_seqs: 32
  enable_chunked_prefill: true
  long_prefill_token_threshold: 4096

latency:
  backend: fitted_ttft
  model_name: glm-v5
  hardware_name: ascend910c
  fitted_ttft:
    profile: glm-v5_ascend910c_default
    function: token_linear_v1
    intercept_ms: 0.0
    ms_per_uncached_token: 0.02
    calibrated_from: manual_default

output:
  directory: reports
  summary: reports/summary.md
